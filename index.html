<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Famous Manchester Spicy Dip Burger | Best Fried Chicken Burger Reviews in Greater Manchester</title>
<meta name="description" content="The only guide to Manchester's best spicy dip chicken burgers. The only place for spicy dipped chicken burger reviews in Greater Manchester.">
<meta name="keywords" content="Spicy dip, Spicy dip burger, spicy dip Manchester, spicy dipped, spicy dipped manchester, spicy dipped burger manchester">
<meta property="og:title" content="The Famous Manchester Spicy Dip">
<meta property="og:description" content="The definitive guide to Manchester's best spicy dip fried chicken burgers. Honest reviews and rankings of the top chicken shops across Manchester.">
<meta property="og:url" content="https://manchesterspicydip.com">
<meta name="robots" content="index, follow">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #FFFDF9; color: #1a1108; max-width: 740px; margin: 0 auto; padding: 0 1.5rem; }
  header { border-bottom: 2px solid #E8380D; padding: 2.5rem 0 1.5rem; margin-bottom: 2rem; }
  .site-label { font-size: 0.72rem; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: #E8380D; margin-bottom: 0.6rem; }
  header h1 { font-family: 'Playfair Display', serif; font-size: 2.6rem; font-weight: 900; line-height: 1.1; color: #1a1108; margin-bottom: 0.6rem; }
  .subheader { font-size: 0.9rem; color: #888; }
  .filters { display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; padding: 1rem 0; border-bottom: 1px solid #f0e8d8; margin-bottom: 2.5rem; }
  .filters label { font-size: 0.72rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: #aaa; }
  .filters select { border: 1px solid #e0d5c0; border-radius: 4px; padding: 0.3rem 0.6rem; font-size: 0.82rem; background: #FFFDF9; color: #1a1108; font-family: 'DM Sans', sans-serif; cursor: pointer; }
  .review { padding: 2rem 0; border-bottom: 1px solid #f0e8d8; }
  .review:last-child { border-bottom: none; }
  .review-meta { display: flex; align-items: baseline; gap: 0.75rem; margin-bottom: 0.6rem; flex-wrap: wrap; }
  .review-num { font-family: 'Playfair Display', serif; font-size: 1rem; color: #E8380D; font-weight: 700; min-width: 1.5rem; }
  .review-name { font-family: 'Playfair Display', serif; font-size: 1.35rem; font-weight: 700; color: #1a1108; line-height: 1.2; }
  .review-location { font-size: 0.78rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: #aaa; }
  .review-pills { display: flex; gap: 0.5rem; flex-wrap: wrap; margin: 0.6rem 0 0.9rem; align-items: center; }
  .pill { font-size: 0.72rem; font-weight: 500; padding: 0.2rem 0.6rem; border-radius: 3px; letter-spacing: 0.04em; }
  .pill-score { background: #E8380D; color: white; }
  .pill-rereviewed { background: #fde8d8; color: #a03a10; border: 1px solid #f0c0a0; }
  .pill-asterisk { background: #f0e8d8; color: #9a7a4a; font-style: italic; }
  .score-block { display: inline-flex; border-radius: 3px; overflow: hidden; font-size: 0.72rem; font-weight: 500; letter-spacing: 0.04em; }
  .score-mine { background: #E8380D; color: white; padding: 0.2rem 0.6rem; }
  .score-google { background: #2d2d2d; color: white; padding: 0.2rem 0.6rem; }
  .score-google .star { color: #fbbc04; }
  .review-img { width: 100%; border-radius: 8px; margin-bottom: 0.9rem; object-fit: cover; object-position: center; max-height: 320px; display: block; }
  .review-desc { font-size: 0.95rem; line-height: 1.75; color: #3a2e1e; }
  .section-label { display: block; font-size: 0.68rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: #E8380D; margin-bottom: 0.35rem; }
  .first-review { margin-top: 1.1rem; padding-top: 1rem; border-top: 1px dashed #e0d5c0; }
  .first-review .section-label { color: #aaa; }
  .first-review .review-desc { font-size: 0.88rem; color: #7a6a50; }
  .no-results { text-align: center; padding: 4rem 0; color: #aaa; font-size: 0.9rem; }
  footer { border-top: 2px solid #E8380D; padding: 2rem 0; margin-top: 2rem; font-size: 0.78rem; color: #bbb; letter-spacing: 0.05em; }
</style>
</head>
<body>
<header>
  <div class="site-label">Manchester Fried Chicken Reviews</div>
  <h1>The Famous Manchester Spicy Dip</h1>
  <p class="subheader" id="subheader"></p>
</header>
<div class="filters">
  <label>Score out of 10:</label>
  <select id="rating-filter" onchange="applyFilters()">
    <option value="all">All</option>
    <option value="5">5+</option>
    <option value="6">6+</option>
    <option value="7">7+</option>
    <option value="8">8+</option>
    <option value="9">9+</option>
  </select>
  <label>Area:</label>
  <select id="area-filter" onchange="applyFilters()">
    <option value="all">All areas</option>
  </select>
</div>
<div id="reviews-list"></div>
<p class="no-results" id="no-results" style="display:none">No spots match your filters. Try widening the search!</p>
<footer>The Famous Manchester Spicy Dip &mdash; All reviews are personal opinions.</footer>
<script>
const reviews = [
  { name: "Miami Crispy", location: "Burnage", area: "Burnage", rating: 9.5, google: 4.3, desc: "Absolutely brilliant, right level of spice, big enough without being too big and great taste on the chicken, the benchmark.", update: "Second time around was just as good.", rereviewed: true, asterisk: false, img: "Fried Chicken JPEGs/processed/Miami Crispy_collage.jpg" },
  { name: "Cluck a Rito", location: "Stretford", area: "Stretford", rating: 8.6, google: 4.5, desc: "A great option that's fairly local, good size and great quality of chicken and bun that held together well. Keeping it out the top 3 is the sauces, there wasn't enough mayo and the spicy sauce had too much tomato flavour, still a solid option.", update: "Different experience on next visit, sauce was a bit sweeter and less spicy but was very, very good.", rereviewed: true, asterisk: false, img: "Fried Chicken JPEGs/processed/Cluck-a-ritos.jpg" },
  { name: "M14 Fried Chicken", location: "Rusholme", area: "Rusholme", rating: 8.5, google: 4.2, desc: "Great value and ticked every box, good bun and chicken was great.", update: null, rereviewed: false, asterisk: false, img: "Fried Chicken JPEGs/processed/m14 fried chicken.jpg" },
  { name: "Vegas", location: "Fallowfield", area: "Fallowfield", rating: 8.3, google: 4.1, desc: "Great spicy sauce, good mayo coverage and the crunch of the fillets kept very nicely. Price point was good and was served nice and quickly. Minor criticisms were that the bun was a bit stale and didn't hold very well and there was a bit of gristle in the chicken. A very good option and would definitely try again.", update: null, rereviewed: false, asterisk: false, img: "Fried Chicken JPEGs/processed/Vegas Fried Chicken.jpg" },
  { name: "Floria's", location: "Fallowfield", area: "Fallowfield", rating: 8.3, google: 4.2, desc: "Huge and spicy but a bit messy as a result.", update: "I think that initial score was harsh, had it again and it was fantastic, good bun, massive amount of chicken and good lettuce and mayo coverage. The only thing lacking was the spicy sauce wasn't as spicy as I remember it and had lots of tomato flavour which got a bit sickly at the end.", rereviewed: true, asterisk: false, img: "Fried Chicken JPEGs/processed/Floria_collage.jpg" },
  { name: "Phat Ladz", location: "Longsight", area: "Longsight", rating: 8.3, google: 4.2, desc: "Massive size and great spicy sauce but got very, very messy. The chicken coating wasn't very seasoned and didn't hold any crispiness/texture. Chips were very good.", update: "Good improvement, great spicy sauce and wasn't stupidly big so that it got too messy. Chicken felt a bit better quality than last time.", rereviewed: true, asterisk: false, img: "Fried Chicken JPEGs/processed/Phat Ladz 1.jpg" },
  { name: "Burger Box", location: "Longsight", area: "Longsight", rating: 8.2, google: 4.6, desc: "Great burger, really good size and spicy sauce was hot but manageable. Loads of mayo and cheese came as standard which pulled everything together nicely. The chicken got a tiny bit dry but otherwise a very solid option at a good price point.", update: null, rereviewed: false, asterisk: false, img: null },
  { name: "Krispy Chicken", location: "Levenshulme", area: "Levenshulme", rating: 8.2, google: 3.7, desc: "A little bit different as it wasn't a dipped burger but almost fried/grilled in the hot sauce. There was a good attention to detail and each individual element was very good. Can't quite put my finger on it but there was something missing overall, but still a very good option.", update: "Bigger, spicier, crispier. A small increase in score after a very solid second outing. Everything was a bit more polished and pushing for a top 5 position.", rereviewed: true, asterisk: false, img: "Fried Chicken JPEGs/processed/Krispy Fried Chicken.jpg" },
  { name: "Roccos", location: "Longsight", area: "Longsight", rating: 8.1, google: 4.3, desc: "Nice old-school vibes from the food with good size and classic chicken shop mayo and lettuce combination. The bun held up superbly and the chicken was big without being scary. The spicy dip was a tiny bit dry and they could have seasoned the otherwise excellent fries more.", update: null, rereviewed: false, asterisk: false, img: "Fried Chicken JPEGs/processed/Roccos_collage.jpg" },
  { name: "Shake Bee", location: "Levenshulme", area: "Levenshulme", rating: 7.7, google: 4.1, desc: "Very, very impressed with this burger, good level of spice and good size, a proper contender for best spicy dip in Manchester.", update: "Disappointing second visit considering how good the first one was, it was absolutely massive but didn't hold texture at all, perhaps too much sauce.", rereviewed: true, asterisk: false, img: "Fried Chicken JPEGs/processed/ShakeBee.jpg" },
  { name: "BIRDS Fried Chicken", location: "Heald Green", area: "Heald Green", rating: 7.7, google: 4.5, desc: "Went for the \"fiery\" option, one level above the standard \"spicy\". Burger was a very good size and looked great in the box with sauce dripping out. Cheese came as standard and good lettuce and mayo coverage. The sauce had very good flavour and was very spicy, the chicken was decent but a little dry. The main complaint was the burgers weren't fully dipped — only sauce on the circumference, meaning the final bites had none. A very good option that needs a re-review in person.", update: null, rereviewed: false, asterisk: true, img: "Fried Chicken JPEGs/processed/BIRDS Fried Chicken.jpg" },
  { name: "Dena Fried Chicken", location: "Chorlton", area: "Chorlton", rating: 7.5, google: 4.0, desc: "Good spicy dip sauce and there was lots of it, good amount of mayo to cut through the spice. Wasn't overly big but was filling enough. A good burger but the chicken itself felt a bit lower standard than others on the list.", update: null, rereviewed: false, asterisk: false, img: "Fried Chicken JPEGs/processed/Dena Fried Chicken.jpg" },
  { name: "Ritoz", location: "Poynton", area: "Poynton", rating: 7.5, google: 4.9, desc: "Good size and felt heavy in the box. A lot of mayo but not a lot of spicy sauce so didn't get too messy. The bun was charred a bit — an interesting touch — but it still didn't hold together that well. Chicken was fine, from memory. Tasted good at the time but this will need a re-review.", update: null, rereviewed: false, asterisk: true, img: null },
  { name: "Clayton's", location: "Stockport", area: "Stockport", rating: 7.4, google: 4.6, desc: "A bit more upmarket with a very limited menu that doesn't do doubles. You can see it's a bit higher quality than a standard spicy dip and the chicken itself was very good. However, the spice level was much too tame. With a bit of work this could be very good, so a bit disappointed to only give a 7.4.", update: null, rereviewed: false, asterisk: false, img: null },
  { name: "Wilmslow Fried Chicken", location: "Didsbury", area: "Didsbury", rating: 7.4, google: 4.5, desc: "Good size, good bun, good flavour on the chicken and nice salad mayo coverage. However, the spicy sauce was quite runny and didn't stick to the burger well enough. This meant the chicken stayed crispy but didn't have a huge amount of spice. Definitely has potential but wasn't quite there today.", update: null, rereviewed: false, asterisk: false, img: "Fried Chicken JPEGs/processed/Wilmslow Fried Chicken.jpg" },
  { name: "0151 Flamin' Grill", location: "City Centre", area: "City Centre", rating: 7.3, google: 4.8, desc: "Only got a single as part of a lunch deal. Good amount of spicy sauce that had an Indian-vibe. Good chicken, but very much on the small side even accounting for the single. Would try a double but was quite pricey.", update: null, rereviewed: false, asterisk: false, img: "Fried Chicken JPEGs/processed/0151 Flamin Grill.jpg" },
  { name: "New Mexico Fried Chicken", location: "Levenshulme", area: "Levenshulme", rating: 7.2, google: 3.7, desc: "Was very impressed with this as didn't go in with high expectations, it was a good size and had plenty of flavour but got a bit salty towards the end.", update: null, rereviewed: false, asterisk: false, img: null },
  { name: "New York Fried Chicken", location: "Levenshulme", area: "Levenshulme", rating: 7.1, google: 3.6, desc: "A solid option that doesn't do a lot wrong but a bit on the small side and not super flavoursome.", update: null, rereviewed: false, asterisk: false, img: "Fried Chicken JPEGs/processed/New York.jpg" },
  { name: "Ohio Fried Chicken", location: "Rusholme", area: "Rusholme", rating: 7.0, google: 4.6, desc: "The most saucy burger yet with lots of spicy dip and a ridiculous amount of mayo. The chicken itself wasn't bad and it was a good size but the other components lacked finesse. The bun was a bit stale and broken apart and the spicy sauce wasn't hot enough and had too much tomato flavour.", update: null, rereviewed: false, asterisk: false, img: "Fried Chicken JPEGs/processed/Ohio Fried Chicken.jpg" },
  { name: "Deens", location: "Old Trafford", area: "Old Trafford", rating: 7.0, google: 4.0, desc: "Started well but the spice took away from the chicken too much, good value though.", update: "Next time was not as fresh but chicken held crispness surprisingly well.", rereviewed: true, asterisk: false, img: "Fried Chicken JPEGs/processed/Deens_collage.jpg" },
  { name: "Alaska Fried Chicken", location: "Gatley", area: "Gatley", rating: 6.9, google: 4.1, desc: "Along the lines of the old-school chicken shops. Spicy dip wasn't that spicy and not much sauce at all. Chicken was decent but bun was stale. Not bad, but definitely room for improvement.", update: null, rereviewed: false, asterisk: false, img: "Fried Chicken JPEGs/processed/Alaska.jpg" },
  { name: "Florida Fried Chicken", location: "Victoria Park", area: "Victoria Park", rating: 6.8, google: 4.3, desc: "The classic, good heat and not too big as to be intimidating, need to try a double and score again.", update: "A bit disappointing, wasn't very fresh or particularly spicy.", rereviewed: true, asterisk: false, img: "Fried Chicken JPEGs/processed/Florida 3.jpg", imgHeight: "600px" },
  { name: "Roosters", location: "Altrincham", area: "Altrincham", rating: 6.4, google: 3.4, desc: "A local stop for me but only had the burger when I've been drinking. Size is quite small and spicy sauce isn't that spicy. Average bun and not much lettuce or mayo. Fine but plenty out there are much better.", update: null, rereviewed: false, asterisk: false, img: "Fried Chicken JPEGs/processed/Roosters 2.jpg", imgHeight: "680px" },
  { name: "BRD Fried Chicken", location: "Chorlton", area: "Chorlton", rating: 5.0, google: 4.5, desc: "Visually it looked great but chicken was breaded as opposed to being battered and resulted in a strange mouthfeel, was very spicy too.", update: null, rereviewed: false, asterisk: false, img: "Fried Chicken JPEGs/processed/BRD Fried Chicken.jpg" },
];
const sorted = [...reviews].sort((a, b) => b.rating - a.rating);
function renderReviews(data) {
  const list = document.getElementById('reviews-list');
  const noResults = document.getElementById('no-results');
  list.innerHTML = '';
  if (!data.length) { noResults.style.display = 'block'; return; }
  noResults.style.display = 'none';
  data.forEach((r, i) => {
    const el = document.createElement('div');
    el.className = 'review';
    const rerePill = r.rereviewed ? `<span class="pill pill-rereviewed">Re-reviewed</span>` : '';
    const asteriskPill = r.asterisk ? `<span class="pill pill-asterisk">* needs re-review</span>` : '';
    const imgHeight = r.imgHeight ? ` style="max-height:${r.imgHeight}"` : '';
    const imgHTML = r.img ? `<img class="review-img" src="${r.img}" alt="${r.name}" loading="lazy"${imgHeight}>` : '';
    let descHTML;
    if (r.rereviewed && r.update) {
      descHTML = `
        <span class="section-label">Re-review</span>
        <p class="review-desc">${r.update}</p>
        <div class="first-review">
          <span class="section-label">First Review</span>
          <p class="review-desc">${r.desc}</p>
        </div>`;
    } else {
      descHTML = `<p class="review-desc">${r.desc}</p>`;
    }
    el.innerHTML = `
      <div class="review-meta">
        <span class="review-num">${i + 1}.</span>
        <span class="review-name">${r.name}</span>
        <span class="review-location">${r.location}</span>
      </div>
      <div class="review-pills">
        <span class="score-block">
          <span class="score-mine">${r.rating}/10</span>
          <span class="score-google"><span class="star">★</span> ${r.google} Google</span>
        </span>
        ${rerePill}${asteriskPill}
      </div>
      ${imgHTML}
      ${descHTML}
    `;
    list.appendChild(el);
  });
}
function applyFilters() {
  const rating = document.getElementById('rating-filter').value;
  const area = document.getElementById('area-filter').value;
  const filtered = sorted.filter(r => {
    if (rating !== 'all' && r.rating < parseFloat(rating)) return false;
    if (area !== 'all' && r.area !== area) return false;
    return true;
  });
  renderReviews(filtered);
}
function populateAreas() {
  const areas = [...new Set(sorted.map(r => r.area))].sort();
  const sel = document.getElementById('area-filter');
  areas.forEach(a => {
    const opt = document.createElement('option');
    opt.value = a; opt.textContent = a;
    sel.appendChild(opt);
  });
}
document.getElementById('subheader').textContent = `${reviews.length} reviews and counting`;
populateAreas();
renderReviews(sorted);
</script>
</body>
</html>
